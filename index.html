<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Portfolio Site</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

/* Top audio bar */
.audio-bar {
  padding: 15px;
  text-align: center;
  background: #1a1a1a;
  border-bottom: 1px solid #333;
}

/* Main layout */
.container {
  display: flex;
  min-height: 80vh;
}

/* Columns */
.column {
  flex: 1;
  padding: 40px;
}

/* Left column style */
.left {
  border-right: 1px solid #333;
}

/* Right column text */
h2 {
  margin-top: 0;
}

/* Photo row */
.photo-row {
  display: flex;
  gap: 15px;
  margin-top: 20px;
}

.photo {
  flex: 1;
  text-align: center;
}

.photo img {
  width: 100%;
  max-width: 250px;
  border-radius: 12px;
}

/* Bottom image */
.bottom-image {
  text-align: center;
  padding: 40px;
}

.bottom-image img {
  width: 250px;
  border-radius: 15px;
  opacity: 0.9;
}
</style>

</head>
<body>

<!-- AUDIO PLAYER -->
<div class="audio-bar">
  <audio controls preload="auto">
    <source src="song.mp3" type="audio/mpeg">
    Your browser does not support audio.
  </audio>
</div>

<!-- MAIN CONTENT -->
<div class="container">

  <!-- LEFT COLUMN -->
  <div class="column left">
    <h2>Memorial / Portfolio</h2>
    <p>
      This is a personal space built to represent memories, identity, and presence.
    </p>
  </div>

  <!-- RIGHT COLUMN -->
  <div class="column">
    <h2>About</h2>

    <p>
      Γεννημένος στα Εξάρχεια, η καρδιά στη Νέα Υόρκη.
    </p>

    <div class="photo-row">
      <div class="photo">
        <img src="photo1.jpg" alt="Photo 1">
        <p>photo1.jpg</p>
      </div>

      <div class="photo">
        <img src="photo2.jpg" alt="Photo 2">
        <p>photo2.jpg</p>
      </div>
    </div>
  </div>

</div>

<!-- BOTTOM IMAGE -->
<div class="bottom-image">
  <img src="patrick.png" alt="Patrick">
</div>

</body>
</html>
